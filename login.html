<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* Page background styling */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #36d1dc, #5b86e5); /* Cool gradient background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container for login form */
        .login-container {
            background-color: rgba(255, 255, 255, 0.9); /* Light semi-transparent background */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 350px;
        }

        /* Heading style */
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        /* Label styling */
        label {
            font-size: 1.1em;
            color: #555;
            display: block;
            margin-bottom: 10px;
        }

        /* Input field styling */
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        /* Button styling */
        button {
            background-color: #4CAF50; /* Green */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Footer text styling */
        .footer-text {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }

        .footer-text a {
            color: #5b86e5;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form action="/login" method="POST">
            <!-- Username -->
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <!-- Password -->
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <!-- Login Button -->
            <button type="submit">Login</button>
        </form>
        <div class="footer-text">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
    </div>
</body>
</html>
